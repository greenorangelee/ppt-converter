# Production: pulls pre-built images from DockerHub instead of building locally
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  backend:
    image: green0ran9e/ppt-converter-backend:latest
    volumes:
      - /home/docker/dockhand/data/stacks/ppt-converter/storage:/app/storage
    restart: unless-stopped

  frontend:
    image: green0ran9e/ppt-converter-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
